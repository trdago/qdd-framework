name: Publish to NPM

# Resource: .github/workflows/publish.yml
# Managed by: QDD
# Mode: merge

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # Permite ejecutar el pipeline manualmente desde la interfaz de GitHub

# Control de concurrencia: Evita que múltiples ejecuciones de este workflow 
# publiquen simultáneamente y causen conflictos en NPM.
concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binaries:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: tar.gz
          - os: linux
            arch: arm64
            ext: tar.gz
          - os: darwin
            arch: amd64
            ext: tar.gz
          - os: darwin
            arch: arm64
            ext: tar.gz
          - os: windows
            arch: amd64
            ext: zip
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS) for UI
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: 'cli/ui/package-lock.json'

      - name: Build UI
        working-directory: ./cli/ui
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Prepare Core Assets
        run: make core-assets

      - name: Build Binary
        working-directory: ./cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o qdd${{ matrix.os == 'windows' && '.exe' || '' }} .
          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip qdd_${{ matrix.os }}_${{ matrix.arch }}.zip qdd.exe
          else
            tar -czvf qdd_${{ matrix.os }}_${{ matrix.arch }}.tar.gz qdd
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./cli/qdd_${{ matrix.os }}_${{ matrix.arch }}.${{ matrix.ext }}

  publish:
    name: Build, Validate and Publish
    needs: build-binaries
    runs-on: ubuntu-latest
    environment: prod
    
    # Permisos mínimos necesarios
    # id-token: write es ESTRICTAMENTE NECESARIO para NPM Trusted Publishing (OIDC)
    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Para asegurarnos de tener el código más reciente asociado al tag/release
          fetch-depth: 1

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          # Especificamos 'lts/*' para que siempre use la última versión LTS 
          # (compatible con futuras actualizaciones)
          node-version: 'lts/*'
          # Habilita el caché automático de npm basado en package-lock.json
          cache: 'npm'
          cache-dependency-path: 'npm/package-lock.json'
          # Configura el registry para npm usando Trusted Publishing
          registry-url: 'https://registry.npmjs.org'

      # Se asume que el paquete NPM a publicar está en la carpeta 'npm/'
      - name: Install Dependencies
        working-directory: ./npm
        run: |
          echo "Restaurando e instalando dependencias con npm ci..."
          npm ci || (echo "::error::Fallo la instalación de dependencias" && exit 1)

      - name: Validate package.json Consistency
        working-directory: ./npm
        run: |
          echo "Validando integridad del package.json..."
          
          # Función helper para extraer valores (usando jq o grep/sed básico)
          # Aquí usamos grep para no depender de jq si no está disponible, 
          # pero jq suele estar preinstalado en ubuntu-latest. Usaremos jq.
          
          MISSING_FIELDS=0
          
          for field in name version repository license homepage author; do
            value=$(jq -r ".$field" package.json)
            if [ "$value" = "null" ] || [ -z "$value" ]; then
              echo "::error::El campo requerido '$field' no existe o está vacío en package.json."
              MISSING_FIELDS=1
            fi
          done
          
          if [ ! -f "package-lock.json" ]; then
            echo "::error::Falta package-lock.json (necesario para NPM CI y Caché)."
            exit 1
          fi

          if [ $MISSING_FIELDS -ne 0 ]; then
            echo "::error::package.json no es consistente. Por favor, corrige los errores antes de publicar."
            exit 1
          fi
          echo "Validación exitosa: package.json cumple con los requisitos."

      - name: Run Linter
        working-directory: ./npm
        run: |
          echo "Ejecutando análisis estático (Lint)..."
          npm run lint || (echo "::error::Fallo en la validación de código (Lint)" && exit 1)

      - name: Run Tests
        working-directory: ./npm
        run: |
          echo "Ejecutando suite de pruebas unitarias..."
          npm run test || (echo "::error::Las pruebas fallaron" && exit 1)

      - name: Build Package
        working-directory: ./npm
        run: |
          echo "Generando el build para producción..."
          npm run build || (echo "::error::El proceso de build falló" && exit 1)

      - name: Publish to NPM
        working-directory: ./npm
        # Se ejecutará solo si TODAS las etapas anteriores fueron exitosas
        run: |
          echo "Publicando paquete en NPM con Provenance..."
          
          # Eliminamos --provenance porque NPM solo lo soporta en repositorios PÚBLICOS.
          npm publish --access public || (echo "::error::Fallo al publicar el paquete en NPM" && exit 1)
        env:
          # Utiliza el token OIDC si está configurado para la organización, 
          # o el secreto NPM_TOKEN si OIDC no está enlazado todavía.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
