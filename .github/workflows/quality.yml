name: Code Quality & Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gates:
    name: Enforce Clean Code & Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Build Framework
        run: |
          make build

      - name: Run Unit Tests & No-Else Rule
        run: |
          make test

      - name: Run Architecture Audit
        run: |
          make audit
