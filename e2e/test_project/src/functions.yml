getStadisticas:
  handler: ./src/mesa/getStadisticas.handler
  events:
    - http:
        path: mesa/estadisticas
        method: get
        cors: true
        integration: lambda
        authorizer:
          arn: arn:aws:cognito-idp:us-east-1:221345006153:userpool/us-east-1_5YkJDsRQi
        response:
          headers:
            Content-Type: "'application/JSON'"
        request:
          template:
            application/json: '{
              "method" : "$context.httpMethod",
              "body" : {"estado_filter" : "$input.params(''estado_filter'')" },
              "headers" : {
              #foreach($param in $input.params().header.keySet())
              "$param": "$util.escapeJavaScript($input.params().header.get($param))"
              #if($foreach.hasNext),#end
              #end
              }
              }'

