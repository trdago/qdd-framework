openapi: 3.0.3
info:
  title: QDD Framework Realtime API
  version: 0.1.1
  description: Contrato de comunicación estricta entre el motor cognitivo QDD y el Dashboard.
servers:
  - url: http://localhost:8080/api
paths:
  /stream:
    get:
      summary: SSE Stream of QDD State
      description: Envía actualizaciones de estado en tiempo real usando Server-Sent Events (SSE).
      responses:
        '200':
          description: Event stream.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/QDDState'
components:
  schemas:
    QDDState:
      type: object
      required:
        - score
        - grade
        - version
        - audit_status
        - findings
        - certifications
        - sprints
        - knowledge
        - config
      properties:
        score:
          type: integer
          description: Puntuación de calidad del proyecto (0-100).
        grade:
          type: string
          description: Grado cualitativo (ej. World-Class).
        version:
          type: string
        audit_status:
          type: string
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        sprints:
          type: array
          items:
            $ref: '#/components/schemas/Sprint'
        knowledge:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeDoc'
        config:
          type: object
          additionalProperties: true
    Finding:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
        desc:
          type: string
        raw:
          type: object
          additionalProperties: true
    Certification:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
        name:
          type: string
        raw:
          type: object
          additionalProperties: true
    Sprint:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
        raw:
          type: object
          additionalProperties: true
    KnowledgeDoc:
      type: object
      required:
        - id
        - path
        - content
      properties:
        id:
          type: string
        path:
          type: string
        content:
          type: string
