id: CERT-011
version: "1.0.0"
title: "Estándar de Interfaz ISO 9241 (Human-Centered Design)"
status: certified
level: strict
description: "Alineación estricta con la familia de normas ISO 9241 para el Dashboard UI, asegurando principios de diálogo (110), presentación de información visual (125) y diseño centrado en el usuario (210)."
criteria:
  - "[ISO 9241-110] La interfaz debe informar siempre el estado actual del sistema (ej: barras de progreso, indicadores de carga)."
  - "[ISO 9241-125] La información visual debe tener jerarquía clara (tipografía, colores semánticos como verde para éxito y rojo para error)."
  - "[ISO 9241-210] Diseño centrado en el usuario: Minimizar la carga cognitiva dividiendo la información en pestañas (Sidebar)."
evidence:
  timestamp: "2026-07-02T21:40:11-04:00"
  test_result: "Se ha añadido soporte para manejar Escape, indicadores de carga explícitos y contrastes semánticos validados."
