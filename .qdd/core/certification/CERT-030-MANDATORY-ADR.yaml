version: "1.0"
id: "CERT-030-MANDATORY-ADR"
name: "Mandatory Architecture Decision Records (Enterprise-Grade)"
description: "Proyectos de escala masiva deben registrar formalmente el análisis previo y las decisiones en un directorio docs/adr/."
category: "Architecture"
severity: "CRITICAL"
rules:
  - type: "dir-exist"
    target: "docs/adr"
    message: "Enterprise-Grade: Falta el registro de decisiones arquitectónicas. El directorio docs/adr es obligatorio para sistemas complejos."
