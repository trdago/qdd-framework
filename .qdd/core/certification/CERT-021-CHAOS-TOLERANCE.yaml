version: "1.0"
id: "CERT-021-CHAOS-TOLERANCE"
name: "Chaos Engineering Resilience (Netflix-Grade)"
description: "Exige que toda llamada externa a Bases de Datos o APIs incluya un Context Timeout explícito para sobrevivir ataques de latencia y bloqueos de red."
category: "Security"
severity: "CRITICAL"
rules:
  - type: "ast-ban"
    target: "QueryRow("
    message: "Netflix-Grade: Uso de QueryRow sin contexto detectado. Use QueryRowContext con Timeout."
  - type: "ast-ban"
    target: "Query("
    message: "Netflix-Grade: Uso de Query sin contexto detectado. Use QueryContext con Timeout."
