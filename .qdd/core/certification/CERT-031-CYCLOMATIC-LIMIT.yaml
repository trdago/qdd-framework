version: "1.0"
id: "CERT-031-CYCLOMATIC-LIMIT"
name: "Extreme Modularization (Cyclomatic Limit)"
description: "Prohíbe funciones espagueti. Toda función debe tener una complejidad ciclomática menor a 5."
category: "Clean Code"
severity: "CRITICAL"
rules:
  - type: "ast-complexity"
    target: "5"
    message: "Enterprise-Grade: Complejidad ciclomática excede el límite de 5. Desacople esta función para asegurar mantenibilidad y testing."
