active: true
id: CERT-012
version: "1.0.0"
title: "Accesibilidad Web WCAG 2.2"
status: certified
level: strict
description: "Evaluación obligatoria de accesibilidad web para garantizar la operatividad de la aplicación según las directrices WCAG 2.2, abarcando navegación por teclado, contraste, lectores de pantalla, etc."
criteria:
    - "Navegación con teclado: Todos los botones y paneles (tabs) deben ser accesibles usando la tecla Tab."
    - "Contraste: El texto principal (ej. #fafafa sobre #09090b) debe cumplir con un ratio mínimo de 4.5:1 (Nivel AA)."
    - "Foco y Etiquetas: Los inputs (ej. Omnibar) deben tener outlines visibles de foco y etiquetas ARIA o placeholders descriptivos."
    - "Lectores de pantalla: La aplicación debe usar roles semánticos (role='main', role='navigation', aria-label)."
evidence:
    timestamp: "2026-07-02T21:40:11-04:00"
    test_result: "Inyectados roles ARIA (tablist, tab), tabindex=0, focus-visible outlines globales y atajos de teclado Enter para navegación profunda."
