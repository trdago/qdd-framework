id: FND-001
type: bug
title: "Escáner de Entorno No Recursivo"
status: resolved
severity: medium
description: |
  El comando `qdd init` utiliza la función `detectLanguages` que busca archivos de configuración
  de lenguaje (como `go.mod` o `package.json`) exclusivamente en la raíz del directorio de ejecución.
  En arquitecturas de monorepo o donde el código fuente está en subcarpetas (ej. `cli/go.mod`),
  el framework falla en detectar el entorno de forma automática.
impact: |
  Disminuye la experiencia "AI-Native" inmediata (zero-config) al forzar al usuario a
  configurar manualmente el archivo `config.yaml` cuando su código no está en la raíz absoluta.
context:
  discovered_by: qdd-framework (dogfooding)
  date_discovered: "2026-07-01"
  related_components:
    - cli/cmd/init.go
resolution:
  requires_certification: true
  evidence_required: EV-FND-001.txt
