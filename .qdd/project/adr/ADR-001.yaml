id: ADR-001
title: "Hybrid Command Routing (Fast Path vs Cognitive Path)"
date: "2026-07-01"
status: accepted
context: |
  QDD requiere equilibrar la velocidad de ejecución y el ahorro de tokens para usuarios expertos (que conocen los comandos formales)
  frente a la flexibilidad del Cognitive Layer (QCL) para intenciones en lenguaje natural o workflows complejos.
decision: |
  Se adopta una arquitectura de Enrutamiento Híbrido (Dual Routing) en la CLI:
  1. Fast Path: Los comandos deterministas (como `qdd certify`, `qdd learn`) se registran explícitamente en la CLI.
     Si el input coincide con ellos, se ejecutan de inmediato de manera estática y determinista, saltándose la IA.
  2. Cognitive Path: Si la CLI no reconoce el comando (unknown command), intercepta la entrada y la redirige 
     al QDD Cognitive Layer (QCL) para análisis semántico y generación de Execution Plan.
consequences:
  positive:
    - Ahorro drástico de tokens (cost-efficiency).
    - Latencia cero para comandos conocidos (DX mejorada).
    - Flexibilidad total con NLP como fallback.
  negative:
    - La CLI debe mantener registro estático de los comandos clave para que el Fast Path funcione.
