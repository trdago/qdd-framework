id: CERT-006
title: Despliegue y Descarga de Paquete NPM
status: PASSED
level: strict
description: "Garantiza que el framework QDD puede empaquetarse, publicarse mediante CI/CD a npmjs, y que el instalador postinstall funcione descargando el binario adecuado."
criteria:
  - "El pipeline de GitHub Actions se ejecuta correctamente bajo reglas SemVer."
