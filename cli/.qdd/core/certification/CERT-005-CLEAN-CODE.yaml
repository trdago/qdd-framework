active: true
id: CERT-005-CLEAN-CODE
title: "Certificación de Arquitectura y Código Limpio (Reglas de QDD)"
status: certified
related_feature: "Industry Standard Baseline"
description: "Valida las reglas globales de código definidas por el framework y el Project Charter."
rules:
    - id: CLEAN-01-NO-ELSE
      description: "Está prohibido el uso de la palabra reservada 'else' en todo el código base."
      method: "Static Code Analysis (AST Verification)"
    - id: CLEAN-02-EARLY-RETURNS
      description: "Toda función debe priorizar la salida más rápida (early returns), validando errores y casos borde al inicio de la función."
      method: "Code Review / AI Analysis"
    - id: CLEAN-03-DOCUMENTED-BUGS
      description: "Cada bug resuelto (Finding) debe tener su test unitario asociado para evitar regresiones antes de poder fusionarse a la rama principal."
      method: "CI/CD Quality Gate"
