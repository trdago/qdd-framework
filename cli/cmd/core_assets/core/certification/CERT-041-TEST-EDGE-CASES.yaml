tags:
    - core
active: true
id: CERT-041-TEST-EDGE-CASES
name: Edge Cases and Bug Driven Testing
description: |
    QDD Philosophy mandates that every discovered bug MUST be documented and accompanied by an automated test to prevent regressions.
    Furthermore, testing cannot rely solely on the happy path. All test suites MUST evaluate edge cases, timeouts, null parameters, and failure states.
severity: HIGH
rules:
    - id: bug_driven_testing
      description: "Ensure that any code resolving a finding or bug is linked to a test file covering the reported scenario."
      level: ERROR
      type: PROCESS
    - id: edge_case_coverage
      description: "Test files must contain scenarios for edge cases and not just valid inputs."
      level: WARNING
      type: STRUCTURAL
      applies_to: ["*_test.go", "*.spec.ts", "*.test.js"]
