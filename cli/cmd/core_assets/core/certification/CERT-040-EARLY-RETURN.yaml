tags:
    - core
active: true
id: CERT-040-EARLY-RETURN
name: Early Return and Guard Clauses Enforcement
description: |
    QDD Philosophy dictates that the 'else' keyword is strictly prohibited across the codebase to reduce cyclomatic complexity.
    All alternative flows and error handling MUST use guard clauses (early returns) at the top of the execution block.
severity: CRITICAL
rules:
    - id: zero_else_policy
      regex: '\belse\b'
      message: "Zero-Else Rule Violation: Found 'else' keyword. Refactor using early return or guard clauses."
      level: ERROR
      type: STRUCTURAL
      applies_to: ["*.go", "*.ts", "*.js", "*.py"]
    - id: require_early_return
      description: "Functions must fail fast and exit early on invalid conditions rather than nesting the happy path."
      level: WARNING
      type: ARCHITECTURAL
